services:
  tool-agent:
    build: ./tool-agent
    ports:
      - "8083:8083"
    environment:
      - PORT=8083
      - GATEWAY_URL=http://gateway:8082
      - GATEWAY_TOKEN=${GATEWAY_TOKEN:-rt_dev_xxx}
      - POOL=workers
      - WORKSPACE_ROOT=/app/data
      # TOOLS=read_file,read_dir,write_file,run_command,web_search  # uncomment to restrict tools
    volumes:
      - workspace-data:/app/data
    depends_on:
      - gateway
    restart: unless-stopped

  gateway:
    build: ./gateway
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - DB_DRIVER=sqlite
      - DB_PATH=/app/data/gateway.db
      - DATA_DIR=/app/data
      - GATEWAY_TOKEN=${GATEWAY_TOKEN:-rt_dev_xxx}
    volumes:
      - workspace-data:/app/data
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "8080:80"
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  workspace-data:
