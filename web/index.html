<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown-light.css">
</head>
<body>

<!-- Background -->
<div class="aurora aurora-1"></div>
<div class="aurora aurora-2"></div>

<!-- Backdrop -->
<div class="backdrop" id="backdrop" onclick="closePanels()"></div>

<!-- Hamburger (fixed, always visible) -->
<button class="hamburger" id="hamburger-btn" data-i18n-title="sidebar.toggle" title="菜单">☰</button>

<!-- Sidebar -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-head">
    <span class="sidebar-logo">✦</span>
    <span class="sidebar-title" data-i18n="app.title">BeLeader</span>
    <button class="sidebar-close-btn" title="收起">✕</button>
  </div>
  <div class="sidebar-nav" id="sidebar-nav">
    <button class="sidebar-item active" data-view="home" onclick="switchView('home')" data-i18n="sidebar.home">首页</button>
  </div>
  <div class="sidebar-foot">
    <button class="sidebar-new-btn" onclick="newThread()" data-i18n-title="sidebar.new_thread" title="New Thread">+ <span data-i18n="sidebar.new_thread">新建会话</span></button>
  </div>
  <div class="sidebar-actions">
    <button class="sidebar-action" onclick="toggleTools()" data-i18n="topbar.tools">Tools</button>
	    <button class="sidebar-action" onclick="toggleAgents()" data-i18n="topbar.agents">Agents</button>
    <button class="sidebar-action" onclick="toggleMCP()" data-i18n="topbar.mcp">MCP</button>
    <button class="sidebar-action" onclick="toggleKnowledge()" data-i18n="topbar.knowledge">知识库</button>
    <button class="sidebar-action" onclick="toggleSettings()" data-i18n="topbar.settings">设置</button>
  </div>
</nav>

<!-- Connection banner (shown when SSE disconnected) -->
<div class="conn-banner" id="conn-banner" style="display:none">
  <span class="conn-banner-dot"></span>
  <span class="conn-banner-text" data-i18n="conn.disconnected_banner">连接已断开，正在重连…</span>
  <button class="conn-banner-reconnect" onclick="reconnectSSE()" data-i18n="conn.reconnect">立即重连</button>
</div>

<!-- Context bar -->
<div class="ctx-bar" id="ctx-bar">
  <div class="ctx-model" id="ctx-model" data-i18n-title="ctx.model_title" title="当前模型">
    <span class="ctx-model-dot" id="ctx-model-dot"></span>
    <span class="ctx-model-name" id="ctx-model-name">—</span>
  </div>
  <div class="ctx-progress-wrap">
    <div class="ctx-progress"><div class="ctx-progress-fill" id="ctx-progress-fill"></div></div>
    <span class="ctx-label" id="ctx-label">0%</span>
  </div>
  <div class="ctx-tokens" id="ctx-tokens" data-i18n-title="ctx.tokens_title" title="累计 token 使用量">⚡ 0</div>
  <span class="ctx-clear" id="ctx-clear" onclick="clearContext()" data-i18n="ctx.clear">清空</span>
  <span class="ctx-bookmarks" id="ctx-bookmarks" onclick="toggleBookmarks()" data-i18n-title="bookmark.button_title" title="收藏">☆</span>
</div>

<!-- Main stage -->
<main class="stage" id="stage">
  <!-- Idle -->
  <div class="idle-state" id="idle-state">
    <div class="idle-glow">✦</div>
    <div class="idle-text" data-i18n="idle.text">告诉我你想做什么</div>
    <div class="idle-hints">
      <button class="hint-chip" onclick="fillInput(this.textContent)" data-i18n="idle.hint1">整理桌面文件</button>
      <button class="hint-chip" onclick="fillInput(this.textContent)" data-i18n="idle.hint2">写一个 Python 爬虫</button>
      <button class="hint-chip" onclick="fillInput(this.textContent)" data-i18n="idle.hint3">查今天的天气</button>
    </div>
  </div>

  <!-- Content area: timeline -->
  <div class="content-area hidden" id="content-area">
    <div class="top-loader" id="top-loader" style="display:none" data-i18n="timeline.loading">加载中…</div>
    <div class="timeline" id="timeline"></div>
  </div>

  <!-- Content cards panel (show_html, show_file) — slides in from right when cards are open -->
  <div class="content-cards" id="content-cards"></div>
</main>


<!-- Image preview -->
<div class="img-preview" id="img-preview"></div>
<input type="file" id="img-file-input" accept="image/*" multiple hidden>

<!-- Input -->
<footer class="input-area">
  <div class="status-bar" id="status-bar">
    <span class="status-indicator"></span>
    <span class="status-text" data-i18n="status.ready">就绪</span>
  </div>
  <div id="input-capsule">
    <button class="capsule-btn stop-btn" data-i18n-title="input.stop_title" title="Stop" onclick="stopSession()">■</button>
    <textarea id="msg-input" rows="1" data-i18n-placeholder="input.placeholder" placeholder="下指令…" autofocus></textarea>
    <button class="capsule-btn aux-btn" data-i18n-title="input.upload_title" title="Upload image" onclick="document.getElementById('img-file-input').click()">📷</button>
        <button class="capsule-btn send-btn" id="send-btn" data-i18n-title="input.send_title" title="Send">↑</button>
  </div>
</footer>

<!-- Panel container — wraps all sliding panels, clipped by overflow:hidden -->
<div class="panel-container" id="panel-container">

<!-- Bookmarks panel (slide from right) -->
<div class="bookmarks-panel" id="bookmarks-panel">
  <div class="panel-head">
    <h3 data-i18n="bookmark.title">★ 收藏消息</h3>
    <button class="panel-close" onclick="toggleBookmarks()">✕</button>
  </div>
  <div class="panel-body" id="bookmarks-body">
    <div class="bookmarks-empty" data-i18n="bookmark.empty">暂无收藏</div>
  </div>
</div>

<!-- Settings panel (slide from right) -->
<div class="settings-panel" id="settings-panel">
  <div class="panel-head">
    <h3 data-i18n="settings.title">设置</h3>
    <button class="panel-close" onclick="toggleSettings()">✕</button>
  </div>
  <div class="panel-body" id="settings-body">
    <div class="set-section">
      <h4 data-i18n="settings.models">模型</h4>
      <button class="btn-add" onclick="addModel()" data-i18n="settings.add_model" style="margin-bottom:10px">+ 添加模型</button>
      <div id="model-list"></div>
    </div>
    <button class="btn-save" onclick="saveSettings()" data-i18n="settings.save">保存设置</button>
  </div>
</div>

<!-- Knowledge panel -->
<div class="settings-panel" id="knowledge-panel">
  <div class="panel-head">
    <h3 data-i18n="knowledge.title">Knowledge</h3>
    <button class="panel-close" onclick="toggleKnowledge()">✕</button>
  </div>
  <div class="panel-body" id="knowledge-body">
    <div class="set-section">
      <div class="set-row">
        <input type="text" id="knowledge-search" data-i18n-placeholder="knowledge.search_placeholder" placeholder="Search knowledge..." oninput="searchKnowledgeUI()">
      </div>
      <div id="knowledge-list"></div>
      <div id="knowledge-pagination"></div>
    </div>
  </div>
</div>

<!-- Tools panel -->
<div class="settings-panel" id="tools-panel">
  <div class="panel-head">
    <h3 data-i18n="tools.title">Tools</h3>
    <button class="panel-close" onclick="toggleTools()">✕</button>
  </div>
  <div class="panel-body" id="tools-body">
    <div id="tools-list"><span class="modal-loading">Loading...</span></div>
  </div>
</div>

<!-- Agents panel -->
<div class="settings-panel" id="agents-panel">
  <div class="panel-head">
    <h3 data-i18n="agents.title">Agents</h3>
    <button class="panel-close" onclick="toggleAgents()">✕</button>
  </div>
  <div class="panel-body" id="agents-body">
    <div class="set-section">

      <div class="set-row" style="display:flex;gap:8px;align-items:center;margin-top:12px">
        <input type="text" id="agents-search" data-i18n-placeholder="agents.search_placeholder" placeholder="搜索 Agent..." oninput="renderAgentListFiltered()">
        <button class="btn-add" onclick="openAgentEditor(null)" data-i18n="agents.new">+ 新建</button>
      </div>
      <div id="agents-list"></div>
    </div>
  </div>
</div>

<!-- MCP panel -->
<div class="settings-panel" id="mcp-panel">
  <div class="panel-head">
    <h3 data-i18n="mcp.title">MCP Servers</h3>
    <button class="panel-close" onclick="toggleMCP()">✕</button>
  </div>
  <div class="panel-body" id="mcp-body">
    <div class="set-section">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
        <input type="text" id="mcp-search" data-i18n-placeholder="mcp.search_placeholder" placeholder="搜索 MCP..." oninput="renderMCPListFiltered()">
        <button class="btn-add" onclick="openMCPEditor(null)" data-i18n="mcp.new">+ 新建</button>
      </div>
      <div id="mcp-list"></div>
    </div>
  </div>
</div>

</div><!-- end panel-container -->

<!-- Modal component (shared by clearContext confirm, agent editor) -->
<div class="modal-backdrop" id="modal-backdrop" style="display:none">
  <div class="modal-dialog" id="modal-dialog">
    <div class="modal-head">
      <h3 id="modal-title">标题</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>marked.setOptions({breaks:true,gfm:true});</script>
<script src="/js/i18n.js"></script>
<script src="/js/state.js"></script>
<script src="/js/stage.js"></script>
<script src="/js/sse.js"></script>
<script src="/js/input.js"></script>
<script src="/js/panels.js"></script>
<script src="/js/knowledge.js"></script>
</body>
</html>
