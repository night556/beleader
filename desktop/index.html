<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{background:transparent}
html,body{width:100%;height:100%;overflow:hidden;cursor:default}
body{background:transparent}
#container{width:200px;height:200px;position:relative}
canvas{display:block;position:absolute;top:0;left:0;z-index:1}
#text-overlay{position:absolute;top:0;left:0;right:0;bottom:38px;z-index:2;
  display:none;flex-direction:column;overflow-y:auto;padding:8px 10px}
#text-overlay.visible{display:flex}
#text-overlay::-webkit-scrollbar{width:3px}
#text-overlay::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
#reply-text{color:rgba(220,210,255,0.92);font-size:12px;line-height:1.6;
  word-break:break-word;text-shadow:0 0 10px rgba(0,0,0,0.9);margin-bottom:4px}
#reply-text h1,#reply-text h2,#reply-text h3{font-size:13px;margin:6px 0 4px;color:#bbaadd}
#reply-text p{margin:2px 0}
#reply-text code{background:rgba(255,255,255,0.08);padding:1px 5px;border-radius:3px;font-size:11px}
#reply-text pre{background:rgba(255,255,255,0.06);padding:6px 8px;border-radius:4px;overflow-x:auto}
#reply-text pre code{background:none;padding:0}
#reply-text ul,#reply-text ol{padding-left:14px;margin:2px 0}
#reply-text li{list-style:disc;margin:1px 0}
#reply-text blockquote{border-left:2px solid rgba(255,255,255,0.2);padding-left:8px;color:rgba(255,255,255,0.55)}
#reply-text a{color:#bbaadd}
#reply-text strong{color:#eee}
#reply-close{position:absolute;top:2px;right:4px;width:18px;height:18px;border-radius:50%;
  background:transparent;border:none;color:rgba(255,255,255,0.35);cursor:pointer;
  font-size:9px;display:none;align-items:center;justify-content:center;z-index:3}
#text-overlay.visible #reply-close{display:flex}
#reply-close:hover{color:#fff}
#status-text{font-size:11px;color:rgba(255,255,255,0.6);text-align:center;
  text-shadow:0 0 8px rgba(0,0,0,0.8)}
#button-bar{position:absolute;bottom:0;left:0;right:0;height:38px;z-index:2;
  display:flex;align-items:flex-end;justify-content:space-between;padding:0 4px 4px 4px;
  background:linear-gradient(transparent,rgba(0,0,0,0.25))}
.btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  border:none;border-radius:50%;background:rgba(30,25,50,0.7);cursor:pointer;
  transition:background 0.2s;pointer-events:auto;backdrop-filter:blur(4px)}
.btn:hover{background:rgba(60,50,90,0.75)}
.btn svg{fill:rgba(255,255,255,0.9)}
.btn.active{background:rgba(100,200,255,0.4)}
.btn.active svg{fill:rgba(180,235,255,1)}
#grip{border-radius:8px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  background:rgba(30,25,50,0.7);transition:background 0.2s;cursor:move;backdrop-filter:blur(4px)}
#grip:hover{background:rgba(60,50,90,0.75)}
#grip svg{width:14px;height:14px;fill:rgba(255,255,255,0.9)}
</style>
</head><body>
<div id="container">
  <canvas id="c"></canvas>
  <div id="text-overlay">
    <button id="reply-close">&#x2715;</button>
    <div id="reply-text"></div>
    <div id="status-text"></div>
  </div>
  <div id="button-bar">
    <button id="voice-btn" class="btn" title="Voice">
      <svg viewBox="0 0 24 24" width="15" height="15"><path d="M12 2a3 3 0 0 1 3 3v6a3 3 0 1 1-6 0V5a3 3 0 0 1 3-3z"/><path d="M17 10v1a5 5 0 0 1-5 5 5 5 0 0 1-5-5v-1H5v1a7 7 0 0 0 6 6.93V21h2v-3.07A7 7 0 0 0 19 11v-1h-2z"/></svg>
    </button>
    <button id="main-btn" class="btn" title="Open Web UI">
      <svg viewBox="0 0 24 24" width="15" height="15"><rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2"/><path d="M3 9h18M9 3v18"/></svg>
    </button>
    <div id="grip">
      <svg viewBox="0 0 24 24"><path d="M12 2l3 3h-2v4h4V7l3 3-3 3v-2h-4v4h2l-3 3-3-3h2v-4H7v2l-3-3 3-3v2h4V5H9z"/></svg>
    </div>
  </div>
</div>
<script type="module" src="/src/orb.ts"></script>
</body></html>
