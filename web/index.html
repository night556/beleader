<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown-light.css">
</head>
<body>

<!-- Background -->
<div class="aurora aurora-1"></div>
<div class="aurora aurora-2"></div>

<!-- Backdrop -->
<div class="backdrop" id="backdrop" onclick="closePanels()"></div>

<!-- Top bar -->
<header class="top-bar">
  <div class="top-left">
    <div class="tab-row" id="tab-row">
      <button class="tab-item home-tab active" data-view="home" onclick="switchView('home')">✦ <span data-i18n="app.title">BeLeader</span></button>
      <span class="tab-divider"></span>
      <button class="tab-add" id="tab-add" data-i18n-title="tab.new_project" title="New Project" onclick="createProject()">+</button>
    </div>
  </div>
  <div class="top-right">
    <button class="icon-btn" data-i18n-title="bookmark.button_title" title="收藏" onclick="toggleBookmarks()"><span class="icon-btn-icon">☆</span><span class="icon-btn-text" data-i18n="topbar.bookmarks">收藏</span></button>
    <button class="icon-btn" data-i18n-title="agents.button_title" title="Agents" onclick="toggleAgents()"><span class="icon-btn-icon">🤖</span><span class="icon-btn-text" data-i18n="topbar.agents">Agents</span></button>
    <button class="icon-btn" data-i18n-title="knowledge.button_title" title="Knowledge" onclick="toggleKnowledge()"><span class="icon-btn-icon">📚</span><span class="icon-btn-text" data-i18n="topbar.knowledge">知识库</span></button>
    <button class="icon-btn" data-i18n-title="settings.button_title" title="设置" onclick="toggleSettings()"><span class="icon-btn-icon">⚙</span><span class="icon-btn-text" data-i18n="topbar.settings">设置</span></button>
  </div>
</header>

<!-- Connection banner (shown when SSE disconnected) -->
<div class="conn-banner" id="conn-banner" style="display:none">
  <span class="conn-banner-dot"></span>
  <span class="conn-banner-text">连接已断开，正在重连…</span>
  <button class="conn-banner-reconnect" onclick="reconnectSSE()">立即重连</button>
</div>

<!-- Context bar -->
<div class="ctx-bar" id="ctx-bar">
  <div class="ctx-model" id="ctx-model" title="当前模型">
    <span class="ctx-model-dot" id="ctx-model-dot"></span>
    <span class="ctx-model-name" id="ctx-model-name">—</span>
  </div>
  <div class="ctx-progress-wrap">
    <div class="ctx-progress"><div class="ctx-progress-fill" id="ctx-progress-fill"></div></div>
    <span class="ctx-label" id="ctx-label">0%</span>
  </div>
  <div class="ctx-tokens" id="ctx-tokens" title="累计 token 使用量">⚡ 0</div>
  <span class="ctx-clear" id="ctx-clear" onclick="clearContext()" data-i18n="ctx.clear">清空</span>
</div>

<!-- Main stage -->
<main class="stage" id="stage">
  <!-- Idle -->
  <div class="idle-state" id="idle-state">
    <div class="idle-glow">✦</div>
    <div class="idle-text" data-i18n="idle.text">告诉我你想做什么</div>
    <div class="idle-hints">
      <button class="hint-chip" onclick="fillInput(this.textContent)" data-i18n="idle.hint1">整理桌面文件</button>
      <button class="hint-chip" onclick="fillInput(this.textContent)" data-i18n="idle.hint2">写一个 Python 爬虫</button>
      <button class="hint-chip" onclick="fillInput(this.textContent)" data-i18n="idle.hint3">查今天的天气</button>
    </div>
  </div>

  <!-- Content area: timeline -->
  <div class="content-area hidden" id="content-area">
    <div class="timeline" id="timeline"></div>
  </div>

  <!-- Content cards panel (show_html, show_file) — slides in from right when cards are open -->
  <div class="content-cards" id="content-cards"></div>
</main>

<!-- TTS progress -->
<div class="tts-bar" id="tts-bar" style="display:none">
  <div class="tts-bar-fill" id="tts-bar-fill" style="width:0%"></div>
  <button class="tts-bar-close" onclick="stopTTS()">✕</button>
</div>

<!-- Image preview -->
<div class="img-preview" id="img-preview"></div>
<input type="file" id="img-file-input" accept="image/*" multiple hidden>

<!-- Agent bar -->
<div class="agent-bar" id="agent-bar"></div>

<!-- Input -->
<footer class="input-area">
  <div class="status-bar" id="status-bar">
    <span class="status-indicator"></span>
    <span class="status-text" data-i18n="status.ready">就绪</span>
  </div>
  <div id="input-capsule">
    <button class="capsule-btn stop-btn" data-i18n-title="input.stop_title" title="Stop" onclick="stopSession()">■</button>
    <textarea id="msg-input" rows="1" data-i18n-placeholder="input.placeholder" placeholder="下指令…" autofocus></textarea>
    <button class="capsule-btn aux-btn" data-i18n-title="input.upload_title" title="Upload image" onclick="document.getElementById('img-file-input').click()">📷</button>
    <button class="capsule-btn aux-btn" id="mic-btn" data-i18n-title="input.voice_title" title="Voice input">🎤</button>
    <button class="capsule-btn aux-btn" id="speak-btn" data-i18n-title="input.voice_output_title" title="Voice output" onclick="toggleSpeak()">🔊</button>
    <button class="capsule-btn send-btn" id="send-btn" data-i18n-title="input.send_title" title="Send">↑</button>
  </div>
</footer>

<!-- Bookmarks panel (slide from right) -->
<div class="bookmarks-panel" id="bookmarks-panel">
  <div class="panel-head">
    <h3>★ 收藏消息</h3>
    <button class="panel-close" onclick="toggleBookmarks()">✕</button>
  </div>
  <div class="panel-body" id="bookmarks-body">
    <div class="bookmarks-empty">暂无收藏</div>
  </div>
</div>

<!-- Settings panel (slide from right) -->
<div class="settings-panel" id="settings-panel">
  <div class="panel-head">
    <h3 data-i18n="settings.title">设置</h3>
    <button class="panel-close" onclick="toggleSettings()">✕</button>
  </div>
  <div class="panel-body" id="settings-body">
    <div class="set-section">
      <h4 data-i18n="settings.general">通用</h4>
      <div class="set-row"><label data-i18n="settings.max_hc">最大并发 (HC)</label><input type="number" id="set-hc-max" min="1" max="20" value="5"></div>
      <div class="set-row"><label data-i18n="settings.context_threshold">上下文阈值 (%)</label><input type="number" id="set-context-pct" min="10" max="95" value="60"></div>
      <div class="set-row set-row-check"><label data-i18n="settings.headless">无头模式</label><input type="checkbox" id="set-headless"></div>
    </div>
    <div class="set-section">
      <h4 data-i18n="settings.voice">语音</h4>
      <div class="set-row"><label data-i18n="settings.stt_lang">STT 语言</label>
        <select id="set-stt-lang">
          <option value="zh-CN">zh-CN</option>
          <option value="en-US">en-US</option>
        </select>
      </div>
      <div class="set-row"><label data-i18n="settings.tts_rate">TTS 语速</label><input type="range" id="set-tts-rate" min="0.5" max="2" step="0.1" value="1"></div>
      <div class="set-row"><label data-i18n="settings.tts_pitch">TTS 音调</label><input type="range" id="set-tts-pitch" min="0.5" max="2" step="0.1" value="1"></div>
      <div class="set-row"><label data-i18n="settings.tts_voice">TTS 语音</label><select id="set-tts-voice"></select></div>
      <div class="set-row set-row-check"><label data-i18n="settings.speak_enabled">语音输出</label><input type="checkbox" id="set-speak-enabled" checked></div>
    </div>
    <div class="set-section">
      <h4>Port Maps</h4>
      <p style="font-size:11px;color:var(--text-dim);margin:4px 0 8px">Map local ports for preview via /api/proxy/{name}/</p>
      <button class="btn-add" onclick="addPortMap()" style="margin-bottom:10px">+ Add Port</button>
      <div id="port-map-list"></div>
    </div>
    <div class="set-section">
      <h4 data-i18n="settings.models">模型</h4>
      <button class="btn-add" onclick="addModel()" data-i18n="settings.add_model" style="margin-bottom:10px">+ 添加模型</button>
      <div id="model-list"></div>
    </div>
    <button class="btn-save" onclick="saveSettings()" data-i18n="settings.save">保存设置</button>
  </div>
</div>

<!-- Knowledge panel -->
<div class="settings-panel" id="knowledge-panel">
  <div class="panel-head">
    <h3 data-i18n="knowledge.title">Knowledge</h3>
    <button class="panel-close" onclick="toggleKnowledge()">✕</button>
  </div>
  <div class="panel-body" id="knowledge-body">
    <div class="set-section">
      <div class="set-row">
        <input type="text" id="knowledge-search" data-i18n-placeholder="knowledge.search_placeholder" placeholder="Search knowledge..." oninput="searchKnowledgeUI()">
      </div>
      <div id="knowledge-list"></div>
      <div id="knowledge-pagination"></div>
    </div>
  </div>
</div>

<!-- Agents panel -->
<div class="settings-panel" id="agents-panel">
  <div class="panel-head">
    <h3 data-i18n="agents.title">Agents</h3>
    <button class="panel-close" onclick="toggleAgents()">✕</button>
  </div>
  <div class="panel-body" id="agents-body">
    <div class="set-section">
      <div class="set-row" style="display:flex;gap:8px;align-items:center">
        <input type="text" id="agents-search" data-i18n-placeholder="agents.search_placeholder" placeholder="搜索 Agent..." oninput="renderAgentListFiltered()" style="flex:1">
        <button class="btn-add" onclick="openAgentEditor(null)" data-i18n="agents.new">+ 新建</button>
      </div>
      <div id="agents-list"></div>
    </div>
  </div>
</div>

<!-- Modal component (shared by createProject, clearContext confirm, agent editor) -->
<div class="modal-backdrop" id="modal-backdrop" style="display:none">
  <div class="modal-dialog" id="modal-dialog">
    <div class="modal-head">
      <h3 id="modal-title">标题</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>marked.setOptions({breaks:true,gfm:true});</script>
<script src="/js/i18n.js"></script>
<script src="/js/state.js"></script>
<script src="/js/stage.js"></script>
<script src="/js/sse.js"></script>
<script src="/js/input.js"></script>
<script src="/js/panels.js"></script>
<script src="/js/knowledge.js"></script>
<script src="/js/voice.js"></script>
</body>
</html>
