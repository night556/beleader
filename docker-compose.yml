services:
  runtime:
    build: ./runtime
    ports:
      - "8083:8083"
    environment:
      - PORT=8083
      - HEADLESS=true
      - GATEWAY_URL=http://gateway:8082
      - GATEWAY_TOKEN=${GATEWAY_TOKEN:-rt_dev_xxx}
      - RUNTIME_URL=http://runtime:8083
      - RUNTIME_NAME=${RUNTIME_NAME:-runtime}
    volumes:
      - runtime-data:/app/data
    depends_on:
      - gateway
    restart: unless-stopped

  gateway:
    build: ./gateway
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - DB_PATH=/app/data/gateway.db
      - DATA_DIR=/app/data
      - RESTRICT_WORKSPACE=${RESTRICT_WORKSPACE:-false}
      - GATEWAY_TOKEN=${GATEWAY_TOKEN:-rt_dev_xxx}
    volumes:
      - gateway-data:/app/data
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "8080:80"
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  runtime-data:
  gateway-data:
